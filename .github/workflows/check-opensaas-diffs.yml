name: Check `opensaas-sh` diffs are up to date

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-diffs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate diffs
        if: ${{ hashFiles('opensaas-sh/tools/patch.sh') != '' && hashFiles('opensaas-sh/tools/diff.sh') != '' }}
        run: |
          ./opensaas-sh/tools/patch.sh
          ./opensaas-sh/tools/diff.sh

      - name: Check for uncommitted changes
        if: ${{ hashFiles('opensaas-sh/tools/patch.sh') != '' && hashFiles('opensaas-sh/tools/diff.sh') != '' }}
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Error: There are uncommitted diff changes"
            echo "Please run './opensaas-sh/tools/patch.sh' and './opensaas-sh/tools/diff.sh' locally and commit the changes"
            git status
            exit 1
          fi

      - name: Skip when OpenSaaS diff tooling is absent
        if: ${{ hashFiles('opensaas-sh/tools/patch.sh') == '' || hashFiles('opensaas-sh/tools/diff.sh') == '' }}
        run: |
          echo "Skipping diff check: opensaas-sh tooling is not present in this repository."
